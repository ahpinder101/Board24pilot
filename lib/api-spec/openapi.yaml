openapi: 3.1.0
info:
  # Do not change the title, if the title changes, the import paths will be broken
  title: Api
  version: 0.1.0
  description: Engineering Manual Knowledge Graph API
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
    description: Health operations
  - name: manuals
    description: Engineering manual management
  - name: graph
    description: Graph data (nodes and edges)
  - name: storage
    description: File storage operations
  - name: chat
    description: Q&A over manuals using RAG + graph
paths:
  /chat:
    post:
      operationId: sendChatMessage
      tags: [chat]
      summary: Ask a question about the engineering manuals
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ChatRequest"
      responses:
        "200":
          description: Answer with citations
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ChatResponse"

  /chat/agent:
    post:
      operationId: sendAgentChatMessage
      tags: [chat]
      summary: Ask a question with Domain Specialist validation and confidence scoring
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AgentChatRequest"
      responses:
        "200":
          description: Answer with citations, confidence, and validation summary
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AgentChatResponse"

  /chat/{sessionId}/history:
    get:
      operationId: getChatHistory
      tags: [chat]
      summary: Get message history for a session
      parameters:
        - name: sessionId
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: List of messages
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/ChatHistoryMessage"

  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"

  /storage/uploads/request-url:
    post:
      operationId: requestUploadUrl
      tags: [storage]
      summary: Request a presigned upload URL for a PDF file
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UploadUrlRequest"
      responses:
        "200":
          description: Presigned URL generated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UploadUrlResponse"

  /manuals:
    get:
      operationId: listManuals
      tags: [manuals]
      summary: List all engineering manuals
      responses:
        "200":
          description: List of manuals
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Manual"
    post:
      operationId: createManual
      tags: [manuals]
      summary: Create a manual record after PDF upload
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ManualInput"
      responses:
        "201":
          description: Manual created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Manual"

  /manuals/domain-coverage:
    get:
      operationId: getDomainCoverage
      tags: [manuals]
      summary: Scan all completed manuals and report technical domain coverage
      security:
        - bearerAuth: []
      responses:
        "200":
          description: Domain coverage report
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DomainCoverageReport"

  /manuals/{id}:
    get:
      operationId: getManual
      tags: [manuals]
      summary: Get a manual by ID
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Manual details
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Manual"
        "404":
          description: Not found
    delete:
      operationId: deleteManual
      tags: [manuals]
      summary: Delete a manual and all its extracted data
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "204":
          description: Deleted

  /manuals/{id}/reset-processing:
    post:
      operationId: resetProcessing
      tags: [manuals]
      summary: Reset a stuck or failed processing job so it can be re-triggered
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Reset successful
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Manual"
        "400":
          description: Manual is not in a resettable state
          content:
            application/json:
              schema:
                type: object
                properties:
                  error:
                    type: string

  /manuals/{id}/process:
    post:
      operationId: processManual
      tags: [manuals]
      summary: Trigger multi-pass AI extraction for a manual
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Processing started
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Manual"

  /manuals/{id}/graph:
    get:
      operationId: getManualGraph
      tags: [graph]
      summary: Get the knowledge graph for a specific manual
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Graph data
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GraphData"

  /manuals/{id}/stats:
    get:
      operationId: getManualStats
      tags: [manuals]
      summary: Get entity and relationship statistics for a manual
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Manual statistics
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ManualStats"

  /manuals/{id}/cost-estimate:
    get:
      operationId: getManualCostEstimate
      tags: [manuals]
      summary: Estimate (or calculate post-run) the AI processing cost for a page range
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
        - name: startPage
          in: query
          schema:
            type: integer
          description: First page of range (inclusive). Omit for whole document.
        - name: endPage
          in: query
          schema:
            type: integer
          description: Last page of range (inclusive). Omit for whole document.
      responses:
        "200":
          description: Cost estimate (pre-run heuristic or post-run from actual metrics)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CostEstimate"
        "404":
          description: Not found

  /manuals/{id}/extraction-plan:
    get:
      operationId: getExtractionPlan
      tags: [manuals]
      summary: Get AI-computed extraction plan based on actual document content
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Extraction plan with tier options derived from real text stats
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ExtractionPlan"
        "404":
          description: Not found

  /manuals/{id}/re-enrich:
    post:
      operationId: reEnrichManual
      tags: [manuals]
      summary: Re-run Pass 8 chunk enrichment (page context + table expansion) without full re-extraction
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Enrichment complete
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/EnrichResult"
        "404":
          description: Not found
        "409":
          description: Manual is already processing

  /graph:
    get:
      operationId: getGlobalGraph
      tags: [graph]
      summary: Get the combined knowledge graph across all manuals
      responses:
        "200":
          description: Combined graph data
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GraphData"

  /stats:
    get:
      operationId: getGlobalStats
      tags: [graph]
      summary: Get aggregate statistics across all manuals
      responses:
        "200":
          description: Global statistics
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GlobalStats"

  /entities/{id}:
    get:
      operationId: getEntity
      tags: [graph]
      summary: Get a single entity with its relationships
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Entity details
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/EntityDetail"
        "404":
          description: Not found

components:
  schemas:
    HealthStatus:
      type: object
      required: [status]
      properties:
        status:
          type: string

    UploadUrlRequest:
      type: object
      required: [name, size, contentType]
      properties:
        name:
          type: string
        size:
          type: integer
        contentType:
          type: string

    UploadUrlResponse:
      type: object
      required: [uploadURL, objectPath]
      properties:
        uploadURL:
          type: string
        objectPath:
          type: string

    Manual:
      type: object
      required: [id, name, filename, objectPath, status, createdAt, updatedAt]
      properties:
        id:
          type: integer
        name:
          type: string
        filename:
          type: string
        objectPath:
          type: string
        status:
          type: string
          enum: [pending, processing, completed, failed, structure_complete]
        processingPass:
          type: ["integer", "null"]
        totalPages:
          type: ["integer", "null"]
        documentType:
          type: ["string", "null"]
        errorMessage:
          type: ["string", "null"]
        currentActivity:
          type: ["string", "null"]
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time

    ManualInput:
      type: object
      required: [name, filename, objectPath]
      properties:
        name:
          type: string
        filename:
          type: string
        objectPath:
          type: string

    GraphNode:
      type: object
      required: [id, manualId, name, type, description]
      properties:
        id:
          type: integer
        manualId:
          type: integer
        name:
          type: string
        type:
          type: string
          enum: [machine, component, subsystem, process, part, material, sensor, system, assembly, document_section]
        description:
          type: string
        properties:
          type: ["object", "null"]
        pageReferences:
          type: array
          items:
            type: integer
        orderIndex:
          type: ["integer", "null"]
        manualName:
          type: ["string", "null"]
        extractionStartPage:
          type: ["integer", "null"]
          description: First page of the document section this entity was extracted from
        extractionEndPage:
          type: ["integer", "null"]
          description: Last page of the document section this entity was extracted from
        sectionPath:
          type: ["string", "null"]
          description: Docling section breadcrumb (e.g. "2. INSTALLATION > 2-3. Lubrication") for the dominant source section

    GraphEdge:
      type: object
      required: [id, manualId, sourceEntityId, targetEntityId, type, label]
      properties:
        id:
          type: integer
        manualId:
          type: integer
        sourceEntityId:
          type: integer
        targetEntityId:
          type: integer
        type:
          type: string
          enum: [contains, part_of, connects_to, depends_on, sequence, communicates_with, powers, controls, feeds_into, mounted_on]
        label:
          type: string
        orderIndex:
          type: ["integer", "null"]
        properties:
          type: ["object", "null"]

    GraphData:
      type: object
      required: [nodes, edges]
      properties:
        nodes:
          type: array
          items:
            $ref: "#/components/schemas/GraphNode"
        edges:
          type: array
          items:
            $ref: "#/components/schemas/GraphEdge"

    EntityDetail:
      type: object
      required: [entity, incomingEdges, outgoingEdges]
      properties:
        entity:
          $ref: "#/components/schemas/GraphNode"
        incomingEdges:
          type: array
          items:
            $ref: "#/components/schemas/GraphEdge"
        outgoingEdges:
          type: array
          items:
            $ref: "#/components/schemas/GraphEdge"

    ManualStats:
      type: object
      required: [manualId, totalEntities, totalRelationships, entitiesByType, relationshipsByType]
      properties:
        manualId:
          type: integer
        totalEntities:
          type: integer
        totalRelationships:
          type: integer
        entitiesByType:
          type: object
        relationshipsByType:
          type: object

    DomainScore:
      type: object
      required: [domain, label, score, chunkHits, entityCount]
      properties:
        domain:
          type: string
        label:
          type: string
        score:
          type: number
          description: 0–100 coverage score for this domain
        chunkHits:
          type: integer
        entityCount:
          type: integer

    ManualDomainCoverage:
      type: object
      required: [manualId, manualName, domains, primaryDomain, totalChunks, totalEntities]
      properties:
        manualId:
          type: integer
        manualName:
          type: string
        domains:
          type: array
          items:
            $ref: "#/components/schemas/DomainScore"
        primaryDomain:
          type: string
        totalChunks:
          type: integer
        totalEntities:
          type: integer

    DomainCoverageReport:
      type: object
      required: [manuals, globalDomains, totalManuals, scannedAt]
      properties:
        manuals:
          type: array
          items:
            $ref: "#/components/schemas/ManualDomainCoverage"
        globalDomains:
          type: array
          items:
            $ref: "#/components/schemas/DomainScore"
        totalManuals:
          type: integer
        scannedAt:
          type: string

    EnrichResult:
      type: object
      required: [ok, manualId, enriched, stitched, expansions]
      properties:
        ok:
          type: boolean
        manualId:
          type: integer
        enriched:
          type: integer
          description: Number of existing chunks that received a page_context value
        stitched:
          type: integer
          description: Number of stitched semantic_expansion chunks created from short consecutive text chunks
        expansions:
          type: integer
          description: Number of semantic_expansion chunks created from BOM table rows

    GlobalStats:
      type: object
      required: [totalManuals, totalEntities, totalRelationships, completedManuals, processingManuals, entitiesByType, relationshipsByType]
      properties:
        totalManuals:
          type: integer
        totalEntities:
          type: integer
        totalRelationships:
          type: integer
        completedManuals:
          type: integer
        processingManuals:
          type: integer
        entitiesByType:
          type: object
        relationshipsByType:
          type: object

    ChatCitation:
      type: object
      required: [manualId, manualName, excerpt]
      properties:
        manualId:
          type: integer
        manualName:
          type: string
        pageNumber:
          type: integer
        excerpt:
          type: string
        entityNames:
          type: array
          items:
            type: string
        citationQuality:
          type: string
          enum: [strong, partial, weak, unverified]
          description: How strongly this citation supports the answer — strong=phrase/quote match, partial=AND-query match, weak=keyword-only, unverified=fallback

    ChatRequest:
      type: object
      required: [question]
      properties:
        question:
          type: string
        sessionId:
          type: string
        imageDataUrl:
          type: string
          description: Optional base64 data URL of an image to include with the question (e.g. data:image/jpeg;base64,...)

    ChatResponse:
      type: object
      required: [answer, citations, sessionId]
      properties:
        answer:
          type: string
        citations:
          type: array
          items:
            $ref: "#/components/schemas/ChatCitation"
        sessionId:
          type: string
        graphEntities:
          type: array
          items:
            type: string

    CostEstimateStep:
      type: object
      required: [step, callCount, inputTokens, outputTokens, costUsd]
      properties:
        step:
          type: string
        callCount:
          type: integer
        inputTokens:
          type: integer
        outputTokens:
          type: integer
        costUsd:
          type: number

    CostEstimate:
      type: object
      required: [model, modelLabel, inputPer1MUsd, outputPer1MUsd, pageCount, inputTokensTotal, outputTokensTotal, estimatedCostUsd, steps, isActual, disclaimer]
      properties:
        model:
          type: string
        modelLabel:
          type: string
        inputPer1MUsd:
          type: number
        outputPer1MUsd:
          type: number
        pageCount:
          type: integer
        inputTokensTotal:
          type: integer
        outputTokensTotal:
          type: integer
        estimatedCostUsd:
          type: number
        steps:
          type: array
          items:
            $ref: "#/components/schemas/CostEstimateStep"
        isActual:
          type: boolean
          description: true = computed from real processed data (post-completion)
        disclaimer:
          type: string

    ExtractionTier:
      type: object
      required: [pages, entityChunks, relChunks, totalInputTokens, outputTokensLow, outputTokensTypical, outputTokensHigh, rationale]
      properties:
        pages:
          type: integer
        entityChunks:
          type: integer
        relChunks:
          type: integer
        totalInputTokens:
          type: integer
        outputTokensLow:
          type: integer
        outputTokensTypical:
          type: integer
        outputTokensHigh:
          type: integer
        rationale:
          type: string

    ExtractionPlan:
      type: object
      required: [totalTextChars, contentPages, avgCharsPerPage, densityLabel, tiers]
      properties:
        totalTextChars:
          type: integer
        contentPages:
          type: integer
        avgCharsPerPage:
          type: integer
        densityLabel:
          type: string
        tiers:
          type: object
          required: [quick, recommended, full]
          properties:
            quick:
              $ref: "#/components/schemas/ExtractionTier"
            recommended:
              $ref: "#/components/schemas/ExtractionTier"
            full:
              $ref: "#/components/schemas/ExtractionTier"

    ChatHistoryMessage:
      type: object
      required: [id, role, content, createdAt]
      properties:
        id:
          type: integer
        role:
          type: string
        content:
          type: string
        citations:
          type: array
          items:
            $ref: "#/components/schemas/ChatCitation"
        createdAt:
          type: string

    AgentChatRequest:
      type: object
      required: [question]
      properties:
        question:
          type: string
        sessionId:
          type: string
        imageDataUrl:
          type: string
          description: Optional base64 data URL of an image (e.g. data:image/jpeg;base64,...)
        domain:
          type: string
          enum: [auto, electrical_control, hydraulic_schematic, pneumatic_schematic, mechanical_assembly, troubleshooting, generic_process]
          description: Force a specific technical domain, or "auto" to detect automatically
        strictness:
          type: string
          enum: [normal, engineering_strict, safety_critical]
          description: Validation strictness level
        retrievalMode:
          type: string
          enum: [fact_lookup, process_trace, troubleshooting_flow, relationship_trace]
          description: Controls retrieval strategy — fact_lookup=tight phrase, process_trace=wider window+paths, troubleshooting_flow=symptom-first+graph, relationship_trace=graph-first
        fromPage:
          type: integer
          description: Filter retrieved chunks to pages >= this value
        toPage:
          type: integer
          description: Filter retrieved chunks to pages <= this value
        minConfidence:
          type: string
          enum: [any, medium, high]
          description: Minimum FTS rank threshold — any=0.01 (default), medium=0.05, high=0.15

    MissingOrWeakEvidenceItem:
      type: object
      required: [claimOrQuestionPart, issue]
      properties:
        claimOrQuestionPart:
          type: string
        issue:
          type: string
          enum: [missing, weak, conflicting]
        explanation:
          type: string

    ValidationMetadata:
      type: object
      required: [validationPassCount, revisedOnce, finalValidationStatus]
      properties:
        validationPassCount:
          type: integer
        revisedOnce:
          type: boolean
        finalValidationStatus:
          type: string
          enum: [passed, passed_with_warnings, failed]

    AgentChatResponse:
      type: object
      required: [answer, citations, sessionId, confidence, answerability, domain, isGuided]
      properties:
        answer:
          type: string
        citations:
          type: array
          items:
            $ref: "#/components/schemas/ChatCitation"
        sessionId:
          type: string
        graphEntities:
          type: array
          items:
            type: string
        confidence:
          type: string
          enum: [high, medium, low, unverified]
        answerability:
          type: string
          enum: [answerable, partially_answerable, not_answerable]
        domain:
          type: string
        isGuided:
          type: boolean
        evidenceSummary:
          $ref: "#/components/schemas/EvidenceSummary"
        validationSummary:
          $ref: "#/components/schemas/ValidationSummary"
        missingOrWeakEvidence:
          type: array
          items:
            $ref: "#/components/schemas/MissingOrWeakEvidenceItem"
          description: Flat list of missing or weak evidence items derived from validation
        validationMetadata:
          $ref: "#/components/schemas/ValidationMetadata"

    EvidenceSummary:
      type: object
      required: [chunksFound, entitiesFound, pathsFound, hasGraphContext, manualsSearched]
      properties:
        chunksFound:
          type: integer
        entitiesFound:
          type: integer
        pathsFound:
          type: integer
        hasGraphContext:
          type: boolean
        manualsSearched:
          type: array
          items:
            type: string

    ValidationSummary:
      type: object
      required: [status, presentItems, missingItems, weakItems, unsupportedClaims, suggestedGuidance, citationIssues, sequenceIssues]
      properties:
        status:
          type: string
          enum: [pass, revise, fail]
        presentItems:
          type: array
          items:
            type: string
        missingItems:
          type: array
          items:
            type: string
        weakItems:
          type: array
          items:
            type: string
        unsupportedClaims:
          type: array
          items:
            type: string
        suggestedGuidance:
          type: array
          items:
            type: string
        citationIssues:
          type: array
          items:
            type: string
          description: Citations that do not actually support the claims they are attached to
        sequenceIssues:
          type: array
          items:
            type: string
          description: Steps or events presented out of order compared to the evidence
